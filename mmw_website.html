<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlashMind – Study Smarter</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;1,9..144,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e0c;
    --surface: #1a1916;
    --card-front: #1f1e1b;
    --card-back: #1a2e1e;
    --accent: #c8f066;
    --accent2: #f0a833;
    --text: #f0ede6;
    --muted: #6b6860;
    --border: #2e2c28;
    --radius: 16px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
    opacity: 0.5;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 24px 48px;
    border-bottom: 1px solid var(--border);
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .home-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    color: var(--muted);
    text-decoration: none;
    letter-spacing: 0.06em;
    padding: 6px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    transition: color 0.2s, border-color 0.2s, background 0.2s;
  }

  .home-btn:hover {
    color: var(--text);
    border-color: var(--muted);
    background: var(--surface);
  }

  .home-btn .arrow { font-size: 0.8rem; }

  .divider {
    width: 1px;
    height: 20px;
    background: var(--border);
  }

  .logo {
    font-family: 'Fraunces', serif;
    font-size: 1.6rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--accent);
  }

  .logo span { color: var(--text); }

  .badge {
    font-size: 0.7rem;
    background: var(--border);
    color: var(--muted);
    padding: 4px 10px;
    border-radius: 99px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  /* ── LAYOUT ── */
  main {
    display: grid;
    grid-template-columns: 380px 1fr;
    gap: 0;
    min-height: calc(100vh - 73px);
  }

  /* ── SIDEBAR ── */
  aside {
    border-right: 1px solid var(--border);
    padding: 36px 32px;
    display: flex;
    flex-direction: column;
    gap: 28px;
    overflow-y: auto;
  }

  .section-label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--muted);
    margin-bottom: 10px;
  }

  label {
    display: block;
    font-size: 0.72rem;
    color: var(--muted);
    margin-bottom: 6px;
    letter-spacing: 0.06em;
  }

  input[type="text"], textarea {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.82rem;
    padding: 12px 14px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    resize: none;
  }

  input[type="text"]:focus, textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(200, 240, 102, 0.08);
  }

  textarea { height: 90px; }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    font-weight: 500;
    letter-spacing: 0.04em;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s, background 0.2s;
  }

  .btn:active { transform: scale(0.97); }

  .btn-primary {
    background: var(--accent);
    color: #0f0e0c;
    padding: 12px 20px;
    width: 100%;
  }

  .btn-primary:hover { box-shadow: 0 4px 20px rgba(200, 240, 102, 0.3); }

  .btn-ghost {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 8px 14px;
    font-size: 0.72rem;
  }

  .btn-ghost:hover { color: var(--text); border-color: var(--muted); }

  .btn-danger {
    background: transparent;
    color: #e05252;
    border: 1px solid #3a2020;
    padding: 8px 14px;
    font-size: 0.72rem;
  }

  .btn-danger:hover { background: #3a2020; }

  .card-list { display: flex; flex-direction: column; gap: 10px; }

  .card-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
    animation: slideIn 0.25s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-item-text { flex: 1; }
  .card-item-q { font-size: 0.75rem; color: var(--text); line-height: 1.4; }
  .card-item-a { font-size: 0.68rem; color: var(--muted); margin-top: 4px; line-height: 1.4; }

  .card-item-num {
    font-size: 0.65rem;
    color: var(--accent);
    font-weight: 500;
    min-width: 20px;
    text-align: right;
  }

  .delete-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 0.9rem;
    padding: 2px 4px;
    transition: color 0.15s;
    line-height: 1;
  }
  .delete-btn:hover { color: #e05252; }

  /* ── STUDY AREA ── */
  .study-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 48px 40px;
    gap: 32px;
  }

  .topic-display { text-align: center; animation: fadeUp 0.5s ease both; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .topic-display h2 {
    font-family: 'Fraunces', serif;
    font-size: 2.4rem;
    font-weight: 700;
    letter-spacing: -0.03em;
    color: var(--text);
    line-height: 1.1;
  }

  .topic-display p {
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 8px;
    letter-spacing: 0.06em;
  }

  .topic-display .topic-tag {
    display: inline-block;
    background: rgba(200, 240, 102, 0.1);
    color: var(--accent);
    border: 1px solid rgba(200, 240, 102, 0.25);
    padding: 4px 12px;
    border-radius: 99px;
    font-size: 0.7rem;
    margin-bottom: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .progress-row {
    width: 100%;
    max-width: 600px;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .progress-bar {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 99px;
    transition: width 0.4s ease;
  }

  .progress-label { font-size: 0.68rem; color: var(--muted); white-space: nowrap; }

  /* ── FLASHCARD ── */
  .flashcard-wrapper {
    perspective: 1200px;
    width: 100%;
    max-width: 580px;
    height: 320px;
    cursor: pointer;
  }

  .flashcard {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .flashcard.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    border-radius: 20px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 36px 40px;
    gap: 14px;
    text-align: center;
  }

  .card-front {
    background: var(--card-front);
    border: 1px solid var(--border);
    box-shadow: 0 20px 60px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.04);
  }

  .card-back {
    background: var(--card-back);
    border: 1px solid rgba(200, 240, 102, 0.15);
    box-shadow: 0 20px 60px rgba(0,0,0,0.4), inset 0 1px 0 rgba(200,240,102,0.06);
    transform: rotateY(180deg);
  }

  .card-eyebrow {
    font-size: 0.62rem;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--muted);
  }

  .card-front .card-eyebrow { color: var(--muted); }
  .card-back .card-eyebrow { color: rgba(200, 240, 102, 0.6); }

  .card-content {
    font-family: 'Fraunces', serif;
    font-size: 1.5rem;
    font-weight: 300;
    font-style: italic;
    line-height: 1.45;
    color: var(--text);
  }

  .card-back .card-content {
    font-style: normal;
    font-weight: 400;
    color: #dff7aa;
  }

  .flip-hint {
    font-size: 0.65rem;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .flip-icon {
    font-size: 0.85rem;
    animation: spin 3s linear infinite;
  }

  @keyframes spin {
    0%, 80%  { transform: rotate(0); }
    100%     { transform: rotate(360deg); }
  }

  .nav-controls { display: flex; align-items: center; gap: 14px; }

  .nav-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 50%;
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    cursor: pointer;
    color: var(--text);
    transition: background 0.2s, border-color 0.2s, transform 0.15s;
  }

  .nav-btn:hover { background: var(--border); border-color: var(--muted); }
  .nav-btn:active { transform: scale(0.93); }
  .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

  .nav-counter { font-size: 0.75rem; color: var(--muted); min-width: 60px; text-align: center; }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 60px 40px;
    text-align: center;
    flex: 1;
  }

  .empty-icon {
    font-size: 3rem;
    opacity: 0.3;
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  .empty-state h3 {
    font-family: 'Fraunces', serif;
    font-size: 1.4rem;
    font-weight: 300;
    font-style: italic;
    color: var(--muted);
  }

  .empty-state p { font-size: 0.72rem; color: #3d3c38; max-width: 280px; line-height: 1.8; }

  .toast {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: var(--accent);
    color: #0f0e0c;
    font-size: 0.75rem;
    font-weight: 500;
    padding: 12px 20px;
    border-radius: 10px;
    z-index: 1000;
    transform: translateY(80px);
    opacity: 0;
    transition: transform 0.3s, opacity 0.3s;
    pointer-events: none;
  }

  .toast.show { transform: translateY(0); opacity: 1; }

  .controls-row {
    display: flex;
    gap: 8px;
    margin-top: auto;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  @media (max-width: 900px) {
    main { grid-template-columns: 1fr; }
    aside { border-right: none; border-bottom: 1px solid var(--border); max-height: 60vh; }
    header { padding: 20px 24px; }
    .study-area { padding: 32px 20px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <a href="index.html" class="home-btn">
      <span class="arrow">←</span> Home
    </a>
    <div class="divider"></div>
    <div class="logo">Tuk<span>las</span></div>
  </div>
  <div class="badge">Study Mode</div>
</header>

<main>
  <aside>
    <div>
      <div class="section-label">01 — Topic</div>
      <label for="topicInput">What are you studying?</label>
      <input type="text" id="topicInput" placeholder="e.g. Photosynthesis, World War II…">
    </div>

    <div>
      <div class="section-label">02 — Add a Card</div>
      <label for="questionInput">Question</label>
      <input type="text" id="questionInput" placeholder="Type your question…" style="margin-bottom:10px;">
      <label for="answerInput">Answer</label>
      <textarea id="answerInput" placeholder="Type the answer…"></textarea>
      <button class="btn btn-primary" onclick="addCard()" style="margin-top:12px;">
        ＋ Add Flashcard
      </button>
    </div>

    <div id="cardListSection" style="display:none;">
      <div class="section-label">03 — Your Cards</div>
      <div class="card-list" id="cardList"></div>
    </div>

    <div class="controls-row">
      <button class="btn btn-ghost" onclick="shuffleCards()">⇌ Shuffle</button>
      <button class="btn btn-ghost" onclick="resetProgress()">↺ Reset</button>
      <button class="btn btn-danger" onclick="clearAll()">✕ Clear All</button>
    </div>
  </aside>

  <section class="study-area" id="studyArea">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">🃏</div>
      <h3>No cards yet…</h3>
      <p>Set a topic and add some flashcards on the left to begin your study session.</p>
    </div>
  </section>
</main>

<div class="toast" id="toast"></div>

<script>
  let cards = [];
  let current = 0;

  const topicInput    = document.getElementById('topicInput');
  const questionInput = document.getElementById('questionInput');
  const answerInput   = document.getElementById('answerInput');
  const cardList      = document.getElementById('cardList');
  const cardListSec   = document.getElementById('cardListSection');
  const studyArea     = document.getElementById('studyArea');
  const emptyState    = document.getElementById('emptyState');

  function addCard() {
    const q = questionInput.value.trim();
    const a = answerInput.value.trim();
    if (!q || !a) { showToast('Please enter both a question and an answer.'); return; }
    cards.push({ q, a });
    questionInput.value = '';
    answerInput.value = '';
    questionInput.focus();
    renderSidebar();
    renderStudy();
    showToast('Flashcard added!');
  }

  function deleteCard(i) {
    cards.splice(i, 1);
    if (current >= cards.length) current = Math.max(0, cards.length - 1);
    renderSidebar();
    renderStudy();
  }

  function renderSidebar() {
    cardList.innerHTML = '';
    if (cards.length === 0) { cardListSec.style.display = 'none'; return; }
    cardListSec.style.display = 'block';
    cards.forEach((c, i) => {
      const item = document.createElement('div');
      item.className = 'card-item';
      item.innerHTML = `
        <div class="card-item-num">${String(i+1).padStart(2,'0')}</div>
        <div class="card-item-text">
          <div class="card-item-q">${escHtml(c.q)}</div>
          <div class="card-item-a">${escHtml(c.a)}</div>
        </div>
        <button class="delete-btn" onclick="deleteCard(${i})" title="Delete">✕</button>
      `;
      cardList.appendChild(item);
    });
  }

  function renderStudy() {
    studyArea.innerHTML = '';
    if (cards.length === 0) {
      studyArea.appendChild(emptyState);
      emptyState.style.display = 'flex';
      return;
    }
    const topic = topicInput.value.trim() || 'Untitled Deck';
    const card  = cards[current];
    studyArea.innerHTML = `
      <div class="topic-display" style="animation-delay:0s">
        <div class="topic-tag">📚 ${escHtml(topic)}</div>
        <h2>Study Session</h2>
        <p>Click the card to reveal the answer</p>
      </div>
      <div class="progress-row">
        <div class="progress-bar">
          <div class="progress-fill" style="width:${((current+1)/cards.length)*100}%"></div>
        </div>
        <div class="progress-label">${current+1} / ${cards.length}</div>
      </div>
      <div class="flashcard-wrapper" onclick="flipCard(this)">
        <div class="flashcard" id="flashcard">
          <div class="card-face card-front">
            <div class="card-eyebrow">Question</div>
            <div class="card-content">${escHtml(card.q)}</div>
            <div class="flip-hint"><span class="flip-icon">↻</span> Click to flip</div>
          </div>
          <div class="card-face card-back">
            <div class="card-eyebrow">Answer</div>
            <div class="card-content">${escHtml(card.a)}</div>
          </div>
        </div>
      </div>
      <div class="nav-controls">
        <button class="nav-btn" onclick="navigate(-1)" ${current===0?'disabled':''} title="Previous">←</button>
        <div class="nav-counter">${current+1} of ${cards.length}</div>
        <button class="nav-btn" onclick="navigate(1)" ${current===cards.length-1?'disabled':''} title="Next">→</button>
      </div>
    `;
  }

  function flipCard(wrapper) {
    wrapper.querySelector('.flashcard').classList.toggle('flipped');
  }

  function navigate(dir) {
    current = Math.min(Math.max(current + dir, 0), cards.length - 1);
    renderStudy();
  }

  function shuffleCards() {
    if (cards.length < 2) { showToast('Add more cards to shuffle!'); return; }
    for (let i = cards.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [cards[i], cards[j]] = [cards[j], cards[i]];
    }
    current = 0;
    renderSidebar();
    renderStudy();
    showToast('Cards shuffled!');
  }

  function resetProgress() {
    current = 0;
    renderStudy();
    showToast('Reset to first card.');
  }

  function clearAll() {
    if (cards.length === 0) return;
    if (!confirm('Clear all flashcards?')) return;
    cards = [];
    current = 0;
    renderSidebar();
    studyArea.innerHTML = '';
    studyArea.appendChild(emptyState);
    emptyState.style.display = 'flex';
    showToast('All cards cleared.');
  }

  document.addEventListener('keydown', e => {
    if (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'TEXTAREA') return;
    if (e.key === 'ArrowRight' || e.key === 'd') navigate(1);
    if (e.key === 'ArrowLeft'  || e.key === 'a') navigate(-1);
    if (e.key === ' ' || e.key === 'Enter') {
      const fc = document.querySelector('.flashcard');
      if (fc) fc.classList.toggle('flipped');
      e.preventDefault();
    }
  });

  questionInput.addEventListener('keydown', e => { if (e.key === 'Enter') { answerInput.focus(); } });
  answerInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); addCard(); } });

  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* ── LOCALSTORAGE PERSISTENCE ── */
  function saveData() {
    localStorage.setItem('tuklas_cards', JSON.stringify(cards));
    localStorage.setItem('tuklas_topic', topicInput.value);
  }

  function loadData() {
    try {
      const saved = localStorage.getItem('tuklas_cards');
      const topic = localStorage.getItem('tuklas_topic');
      if (saved) cards = JSON.parse(saved);
      if (topic) topicInput.value = topic;
    } catch(e) { cards = []; }
  }

  /* Auto-save on topic input change */
  topicInput.addEventListener('input', saveData);

  /* Patch all state-changing functions to save after running */
  const _addCard = addCard;
  // Override save into each mutating action instead by wrapping renderSidebar
  const _renderSidebar = renderSidebar;
  renderSidebar = function() { _renderSidebar(); saveData(); };

  const _clearAll = clearAll;
  clearAll = function() {
    if (cards.length === 0) return;
    if (!confirm('Clear all flashcards?')) return;
    cards = [];
    current = 0;
    renderSidebar();
    studyArea.innerHTML = '';
    studyArea.appendChild(emptyState);
    emptyState.style.display = 'flex';
    localStorage.removeItem('tuklas_cards');
    localStorage.removeItem('tuklas_topic');
    topicInput.value = '';
    showToast('All cards cleared.');
  };

  /* Init — load saved data then render */
  loadData();
  if (cards.length > 0) {
    renderSidebar();
    renderStudy();
    showToast('Cards restored! 🎉');
  } else {
    studyArea.appendChild(emptyState);
  }
</script>
</body>
</html>
